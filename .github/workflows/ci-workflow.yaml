---
name: CI
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 1
      matrix:
        # Available node versions: https://raw.githubusercontent.com/actions/node-versions/main/versions-manifest.json
        node: [ '22', '24', '26' ]
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v5
        with:
          set-safe-directory: ${{ github.workspace }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm install -g bob@5.0.1
      - run: |
          if [ "${{ matrix.node }}" = "26" ]; then
            bob clean dep style lint complexity test test-integration doc
          else
            bob build
          fi
      - uses: coverallsapp/github-action@v2.3.6
        if: ${{ matrix.node != '26' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: .bob/coverage/c8/lcov.info
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.STUDIO_GITHUB_TOKEN }}
          publish_dir: .bob
